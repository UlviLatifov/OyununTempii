<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skor Kart</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root {
  --bg:      #f2f4f8;
  --surface: #ffffff;
  --border:  #e4e7ef;
  --accent:  #18a05a;
  --accent2: #0f7a42;
  --dark:    #111318;
  --text:    #1c1f2e;
  --sub:     #6b7080;
  --red:     #e53935;
  --card-bg: #ffffff;
  --card-stripe: #f7f8fb;
}

/* ── DARK MODE ───────────────────────────────────────── */
body.dark {
  --bg:      #0d0f14;
  --surface: #161a22;
  --border:  #272c38;
  --accent:  #22c065;
  --accent2: #18a05a;
  --dark:    #e8ecf4;
  --text:    #dde1ed;
  --sub:     #7a8099;
  --red:     #f04040;
  --card-bg: #161a22;
  --card-stripe: #1c2030;
}

/* ── THEME TOGGLE ────────────────────────────────────── */
.theme-toggle {
  margin-left: auto;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 5px 13px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--sub);
  cursor: pointer;
  transition: all .2s;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Outfit', sans-serif;
}
.theme-toggle:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ── RESET ───────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

/* ── PAGE ────────────────────────────────────────────── */
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  padding: 32px 16px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── TOPBAR ──────────────────────────────────────────── */
.topbar {
  width: 100%; max-width: 640px;
  display: flex; align-items: center; gap: 13px;
  margin-bottom: 28px;
}
.topbar img { width:40px; height:40px; object-fit:contain; }
.topbar h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size: 2rem; letter-spacing: 3px; color: var(--dark);
}
.topbar span {
  font-size: 0.65rem; letter-spacing: 2px;
  text-transform: uppercase; color: var(--sub);
  display: block; margin-top: -3px;
}

/* ── EDITOR PANEL ────────────────────────────────────── */
.editor {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px;
  width: 100%; max-width: 640px;
  box-shadow: 0 1px 12px rgba(0,0,0,0.06);
  margin-bottom: 14px;
}
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 0.63rem; font-weight: 700;
  letter-spacing: 1.6px; text-transform: uppercase;
  color: var(--sub); margin-bottom: 6px;
}
.field input {
  width: 100%; border: 1.5px solid var(--border);
  border-radius: 9px; padding: 9px 13px;
  font-size: 0.88rem; font-family: 'Outfit', sans-serif;
  background: var(--bg); color: var(--text);
  outline: none; transition: border-color .18s;
}
.field input:focus { border-color: var(--accent); }

/* ── LEAGUE BLOCK ────────────────────────────────────── */
.leagues-wrap { display: flex; flex-direction: column; gap: 12px; }
.league-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 13px;
}
.league-header {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 13px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.league-selector-wrap { flex: 1; position: relative; }
.league-selector-btn {
  width: 100%; display: flex; align-items: center; gap: 8px;
  border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 10px; background: var(--surface); cursor: pointer;
  transition: border-color .18s;
}
.league-selector-btn:hover { border-color: var(--accent); }
.league-selector-btn img { width:20px; height:20px; object-fit:contain; flex-shrink:0; }
.league-selector-btn .ls-name {
  flex: 1; font-family:'Bebas Neue',sans-serif;
  font-size: 0.95rem; letter-spacing: 2px; color: var(--dark);
}
.league-selector-btn .ls-arrow { color: var(--sub); font-size: 0.75rem; }
.league-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  z-index: 9999; background: var(--surface);
  border: 1px solid var(--border); border-radius: 11px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.22);
  display: none; max-height: 260px; overflow-y: auto;
}
.league-dropdown.open { display: block; }
.ld-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 12px; cursor: pointer; transition: background .1s;
}
.ld-item:hover { background: var(--bg); }
.ld-item img { width:20px; height:20px; object-fit:contain; flex-shrink:0; }
.ld-item span {
  font-family:'Bebas Neue',sans-serif;
  font-size: 0.9rem; letter-spacing: 1.5px; color: var(--dark);
}
.remove-league-btn {
  background: none; border: none; cursor: pointer;
  color: var(--sub); font-size: 1rem; transition: color .18s; flex-shrink: 0;
}
.remove-league-btn:hover { color: var(--red); }

/* ── MATCH ROW ───────────────────────────────────────── */
.matches-in-league {
  padding: 10px 10px 4px;
  display: flex; flex-direction: column; gap: 8px;
}
.match-row {
  display: grid; grid-template-columns: 1fr 96px 1fr 26px;
  gap: 6px; align-items: center;
  background: var(--surface); border-radius: 10px;
  padding: 8px; border: 1px solid var(--border);
}
.team-wrap { position: relative; }
.team-wrap input {
  width: 100%; border: 1px solid var(--border); border-radius: 7px;
  padding: 7px 8px 7px 30px;
  font-size: 0.8rem; font-family: 'Outfit', sans-serif;
  font-weight: 600; color: var(--text);
  background: var(--bg); outline: none; transition: border-color .18s;
}
.team-wrap input.right-align { text-align: right; padding: 7px 30px 7px 8px; }
.team-wrap input:focus { border-color: var(--accent); }
.tlogo {
  position: absolute; top: 50%; transform: translateY(-50%);
  left: 7px; width: 18px; height: 18px;
  object-fit: contain; pointer-events: none; display: none;
  overflow: visible;
}
.tlogo.right { left: auto; right: 7px; }

/* score editor */
.score-wrap {
  display: flex; align-items: center;
  background: var(--dark); border-radius: 8px; overflow: hidden;
}
body.dark .score-wrap {
  background: transparent;
  border: 1.5px solid var(--border);
}
.score-inp {
  width: 40px; text-align: center; border: none;
  background: transparent;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.35rem; color: #fff;
  padding: 6px 0; outline: none; -moz-appearance: textfield;
}
body.dark .score-inp { color: var(--text); }
.score-inp::-webkit-inner-spin-button,
.score-inp::-webkit-outer-spin-button { -webkit-appearance: none; }
.score-sep {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem; color: rgba(255,255,255,0.2);
}
body.dark .score-sep { color: var(--border); }
.remove-match-btn {
  background: none; border: none; cursor: pointer;
  color: #ccc; font-size: 0.9rem; transition: color .18s; padding: 4px;
}
.remove-match-btn:hover { color: var(--red); }

/* ── AUTOCOMPLETE ────────────────────────────────────── */
.ac-list {
  position: absolute; top: calc(100% + 3px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.22);
  z-index: 9999; max-height: 210px; overflow-y: auto; display: none;
}
.ac-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 12px; cursor: pointer;
  font-size: 0.81rem; font-weight: 600; transition: background .1s;
}
.ac-item:hover { background: var(--bg); }
.ac-item img { width:20px; height:20px; object-fit:contain; flex-shrink:0; border-radius:2px; }
.ac-league-tag { font-size: 0.65rem; color: var(--sub); font-weight: 500; margin-left: auto; white-space: nowrap; }
.ac-loading { padding: 10px 14px; font-size: 0.78rem; color: var(--sub); }
.ac-section-header {
  padding: 5px 12px 3px;
  font-size: 0.6rem; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--sub);
  background: var(--bg); border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
}

/* ── FOOTER / ADD BTNS ───────────────────────────────── */
.league-footer { padding: 0 10px 10px; }
.btn-sm {
  width: 100%; padding: 8px;
  border: 1.5px dashed var(--border); border-radius: 8px;
  background: transparent; font-family: 'Outfit', sans-serif;
  font-size: 0.76rem; font-weight: 600; color: var(--sub);
  cursor: pointer; transition: all .18s;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); background: rgba(34,192,101,0.08); }
.bottom-btns {
  width: 100%; max-width: 640px;
  display: flex; gap: 10px; margin-bottom: 32px;
}
.btn-main {
  flex: 1; padding: 13px; border: none; border-radius: 11px;
  font-family: 'Outfit', sans-serif; font-weight: 700;
  font-size: 0.88rem; cursor: pointer; transition: all .18s;
}
.btn-add-league { background: rgba(34,192,101,0.12); color: var(--accent); }
.btn-add-league:hover { background: #d0f0e0; }
.btn-generate { background: var(--accent); color: #fff; }
.btn-generate:hover { background: var(--accent2); }

/* ── PREVIEW WRAP ────────────────────────────────────── */
#preview-wrap { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 420px; }
#preview-wrap.visible { display: flex; }

/* ══════════════════════════════════════════════════════
   CARD  —  premium minimal white
══════════════════════════════════════════════════════ */
#card-wrapper {
  width: 100%;
  border-radius: 0;
  overflow: hidden;
  box-shadow: 0 2px 24px rgba(0,0,0,0.10);
  border: 1px solid var(--border);
  background: var(--surface);
}
#card {
  width: 100%;
  background: var(--surface);
}

/* Header strip */
.card-top {
  padding: 14px 18px 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.card-top-left { display: flex; align-items: center; gap: 10px; }
.card-top-logo {
  width: 56px; height: 56px;
  object-fit: contain; flex-shrink: 0;
  display: block;
  padding: 4px;
}
.card-top-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem; letter-spacing: 2.5px; color: var(--text);
}
.card-top-date {
  font-size: 0.58rem; letter-spacing: 1.6px;
  color: var(--sub); text-transform: uppercase; margin-top: 1px;
}
.card-top-right {
  font-size: 0.55rem; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--sub);
}

/* League section */
.card-league-section { border-bottom: 1px solid var(--border); }
.card-league-section:last-child { border-bottom: none; }

.card-league-header {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 18px 6px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.card-league-badge { width: 18px; height: 18px; object-fit: contain; }
.card-league-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.72rem; letter-spacing: 2.5px; color: var(--sub);
}

/* Match row on card */
.card-match {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 6px 18px;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  overflow: visible;
}
.card-match:last-child { border-bottom: none; }

/* Teams */
.cm-team { display: flex; align-items: center; gap: 7px; overflow: visible; }
.cm-team.right { flex-direction: row-reverse; }
.cm-logo { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; overflow: visible; }
.cm-name {
  font-size: 0.72rem; font-weight: 700;
  color: var(--text); line-height: 1.2;
}
.cm-name.right { text-align: right; }

/* Score — slim dark pill */
.cm-score {
  display: flex; align-items: center;
  background: var(--dark);
  border-radius: 7px;
  flex-shrink: 0;
  min-width: 54px;
  justify-content: center;
  padding: 0 2px;
}
body.dark .cm-score {
  background: transparent;
  border: 1.5px solid var(--border);
}
.cm-snum {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem; line-height: 1;
  color: var(--surface);
  width: 22px; text-align: center;
  padding: 4px 0;
}
body.dark .cm-snum { color: var(--text); }
.cm-snum.win { color: #4ade80; }
.cm-ssep {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.85rem; color: rgba(128,128,128,0.4);
}

/* Footer */
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 18px;
  background: var(--bg);
  border-top: 1px solid var(--border);
}
.cf-brand {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 2px; font-size: 0.75rem; color: var(--sub);
}
.cf-logo { width: 40px; height: 40px; object-fit: contain; opacity: 0.45; }

.card-brand-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.85rem; letter-spacing: 3px;
  color: var(--sub); font-weight: 400;
}
.cf-brand-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.65rem; letter-spacing: 2px;
  color: var(--sub);
}

.card-watermark {
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.7rem; letter-spacing: 4px;
  color: var(--sub);
  padding: 6px 0;
  border-top: 1px solid var(--border);
}

/* Download btn */
.ss-btn {
  margin-top: 18px; width: 100%;
  padding: 15px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 12px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem; letter-spacing: 2.5px;
  cursor: pointer; transition: background .18s;
}
.ss-btn:hover { background: var(--accent2); }

/* Scrollbars */
.ac-list::-webkit-scrollbar,
.league-dropdown::-webkit-scrollbar { width: 4px; }
.ac-list::-webkit-scrollbar-thumb,
.league-dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>

// ═══════════════════════════════════════════════════════
//  LOGO CACHE  (fetched via TheSportsDB /searchteams)
// ═══════════════════════════════════════════════════════
const logoCache   = {};   // 'name lower' → 'https://...' or ''
const inFlight    = {};   // 'name lower' → Promise

async function getLogoByName(name) {
  const key = (name||'').toLowerCase().trim();
  if (!key) return '';
  if (key in logoCache)  return logoCache[key];
  if (key in inFlight)   return inFlight[key];

  const p = (async () => {
    try {
      const url  = 'https://www.thesportsdb.com/api/v1/json/3/searchteams.php?t=' + encodeURIComponent(name);
      const res  = await fetch(url);
      const data = await res.json();
      const teams = (data.teams || []).filter(t => t.strSport === 'Soccer');
      const exact = teams.find(t => t.strTeam.toLowerCase() === key);
      const team  = exact || teams[0];
      const logo  = (team && team.strTeamBadge) ? team.strTeamBadge : '';
      logoCache[key] = logo;
      return logo;
    } catch(e) {
      logoCache[key] = '';
      return '';
    } finally {
      delete inFlight[key];
    }
  })();

  inFlight[key] = p;
  return p;
}

// Background prefetch for a league's clubs (small batches, no rush)
async function prefetchLeague(lgId) {
  const clubs = LEAGUE_CLUBS[lgId] || [];
  for (let i = 0; i < clubs.length; i += 3) {
    await Promise.all(clubs.slice(i, i+3).map(c => getLogoByName(c)));
  }
}

function buildDropdown(lid) {
  const dd = document.getElementById('ld-' + lid);
  dd.innerHTML = '';
  Object.entries(LEAGUE_META).forEach(([lgId, lg]) => {
    const d   = document.createElement('div'); d.className = 'ld-item';
    const img = document.createElement('img');
    img.src = lg.logo; img.onerror = () => img.style.display = 'none';
    const sp  = document.createElement('span'); sp.textContent = lg.name;
    d.append(img, sp);
    d.addEventListener('mousedown', e => { e.preventDefault(); selectLeague(lid, lgId); });
    dd.appendChild(d);
  });
}

function toggleDropdown(lid) {
  const dd = document.getElementById('ld-' + lid);
  const was = dd.classList.contains('open');
  document.querySelectorAll('.league-dropdown.open').forEach(el => el.classList.remove('open'));
  if (!was) dd.classList.add('open');
}

function selectLeague(lid, lgId) {
  const lg  = LEAGUE_META[lgId]; if (!lg) return;
  const btn = document.getElementById('ls-btn-' + lid);
  btn.querySelector('img').src = lg.logo;
  btn.querySelector('img').style.display = 'block';
  btn.querySelector('.ls-name').textContent = lg.name;
  document.getElementById('league-' + lid).dataset.lgId = lgId;
  document.getElementById('ld-' + lid).classList.remove('open');
  prefetchLeague(lgId);
}

//  AUTOCOMPLETE
// ═══════════════════════════════════════════════════════
const timers = {};

function lgIdForMatch(mid) {
  const row = document.getElementById('mr-' + mid); if (!row) return 'epl';
  const blk = document.getElementById('league-' + row.dataset.lid);
  return blk ? blk.dataset.lgId : 'epl';
}

function onInput(mid, side) {
  const val = document.getElementById('ti-' + side + '-' + mid).value.trim();
  if (!teamData[mid]) teamData[mid] = {h:{name:'',logo:''},a:{name:'',logo:''}};
  teamData[mid][side].name = val;
  teamData[mid][side].logo = '';
  showLogo(mid, side, '');
  clearTimeout(timers[mid+side]);
  if (!val) { closeAC(mid,side); return; }
  timers[mid+side] = setTimeout(() => buildAC(mid, side, val), 180);
}

function onFocus(mid, side) {
  buildAC(mid, side, document.getElementById('ti-' + side + '-' + mid).value.trim());
}
function onBlur(mid, side) { setTimeout(() => closeAC(mid,side), 200); }
function closeAC(mid, side) {
  const el = document.getElementById('ac-' + side + '-' + mid);
  if (el) { el.style.display = 'none'; el.innerHTML = ''; }
}

function buildAC(mid, side, query) {
  const ac = document.getElementById('ac-' + side + '-' + mid); if (!ac) return;
  const q   = query.toLowerCase();
  const lgId = lgIdForMatch(mid);
  const thisClubs = LEAGUE_CLUBS[lgId] || [];

  const local  = thisClubs.filter(c => !q || c.toLowerCase().includes(q));
  const others = [];
  if (q.length >= 2) {
    Object.entries(LEAGUE_CLUBS).forEach(([id, clubs]) => {
      if (id === lgId) return;
      clubs.forEach(c => {
        if (c.toLowerCase().includes(q)) others.push({name:c, lg:LEAGUE_META[id]?.name||id});
      });
    });
  }

  let html = '';
  if (local.length) {
    html += '<div class="ac-section-header">' + (LEAGUE_META[lgId]?.name||lgId) + '</div>';
    local.forEach(c => { html += acItemHTML(c, mid, side, ''); });
  }
  if (others.length) {
    html += '<div class="ac-section-header">Digər liqalar</div>';
    others.slice(0,12).forEach(o => { html += acItemHTML(o.name, mid, side, o.lg); });
  }
  if (!html) html = '<div class="ac-loading">Tapılmadı</div>';
  ac.innerHTML = html; ac.style.display = 'block';
}

function acItemHTML(name, mid, side, lgTag) {
  const sn = name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const logo = logoCache[name.toLowerCase()] || '';
  const sl   = logo.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  let h = '<div class="ac-item" onmousedown="pick(event,' + mid + ',\'' + side + '\',\'' + sn + '\',\'' + sl + '\')">';
  if (logo) h += '<img src="' + logo + '" onerror="this.style.display=\'none\'">';
  else       h += '<span style="width:22px;height:22px;display:inline-block;flex-shrink:0"></span>';
  h += '<span>' + name + '</span>';
  if (lgTag) h += '<span class="ac-league-tag">' + lgTag + '</span>';
  return h + '</div>';
}

function pick(e, mid, side, name, logo) {
  e.preventDefault();
  document.getElementById('ti-' + side + '-' + mid).value = name;
  if (!teamData[mid]) teamData[mid] = {h:{name:'',logo:''},a:{name:'',logo:''}};
  teamData[mid][side].name = name;
  closeAC(mid, side);
  if (logo) {
    teamData[mid][side].logo = logo;
    showLogo(mid, side, logo);
  } else {
    getLogoByName(name).then(l => {
      if (l) { teamData[mid][side].logo = l; showLogo(mid, side, l); }
    });
  }
}

async function generateCard() {
  const btn = document.querySelector('.btn-generate');
  const orig = btn ? btn.textContent : '';
  if (btn) { btn.textContent = 'Loqolar yüklənir...'; btn.disabled = true; }

  // Sync inputs → teamData, fetch missing logos
  const fetches = [];
  document.querySelectorAll('.match-row').forEach(row => {
    const mid = row.id.replace('mr-','');
    const td  = teamData[mid]; if (!td) return;
    const hi  = document.getElementById('ti-h-' + mid);
    const ai  = document.getElementById('ti-a-' + mid);
    if (hi) td.h.name = hi.value.trim();
    if (ai) td.a.name = ai.value.trim();
    if (td.h.name && !td.h.logo) fetches.push(getLogoByName(td.h.name).then(l => { if(l){td.h.logo=l;showLogo(mid,'h',l);} }));
    if (td.a.name && !td.a.logo) fetches.push(getLogoByName(td.a.name).then(l => { if(l){td.a.logo=l;showLogo(mid,'a',l);} }));
  });
  await Promise.all(fetches);
  if (btn) { btn.textContent = orig; btn.disabled = false; }

  const brand = document.getElementById('inp-brand').value || '';
  const date  = document.getElementById('inp-date').value;
  document.getElementById('out-brand').textContent  = brand;
  document.getElementById('out-date').textContent   = date;
  document.getElementById('out-brand2').textContent = brand;

  const outLeagues = document.getElementById('out-leagues');
  outLeagues.innerHTML = '';

  document.querySelectorAll('.league-block').forEach(lb => {
    const lgId  = lb.dataset.lgId;
    const lg    = LEAGUE_META[lgId] || {};
    const sec   = document.createElement('div'); sec.className = 'card-league-section';
    let hdr = '<div class="card-league-header">';
    if (lg.logo) hdr += '<img class="card-league-badge" src="' + lg.logo + '" crossorigin="anonymous" onerror="this.style.display=\'none\'">';
    hdr += '<div class="card-league-name">' + (lg.name||'').toUpperCase() + '</div></div>';
    sec.innerHTML = hdr;

    lb.querySelectorAll('.match-row').forEach(row => {
      const mid = row.id.replace('mr-','');
      const td  = teamData[mid] || {h:{name:'',logo:''},a:{name:'',logo:''}};
      const s1  = parseInt((document.getElementById('sh-'+mid)||{}).value)||0;
      const s2  = parseInt((document.getElementById('sa-'+mid)||{}).value)||0;
      const hw  = s1>s2?' win':'', aw = s2>s1?' win':'';
      const mc  = document.createElement('div'); mc.className = 'card-match';
      let m = '<div class="cm-team">';
      if (td.h.logo) m += '<img class="cm-logo" src="' + td.h.logo + '" crossorigin="anonymous" onerror="this.style.display=\'none\'">';
      m += '<div class="cm-name">' + (td.h.name||'—') + '</div></div>';
      m += '<div class="cm-score"><div class="cm-snum'+hw+'">' + s1 + '</div><div class="cm-ssep">:</div><div class="cm-snum'+aw+'">' + s2 + '</div></div>';
      m += '<div class="cm-team right">';
      if (td.a.logo) m += '<img class="cm-logo" src="' + td.a.logo + '" crossorigin="anonymous" onerror="this.style.display=\'none\'">';
      m += '<div class="cm-name right">' + (td.a.name||'—') + '</div></div>';
      mc.innerHTML = m; sec.appendChild(mc);
    });
    outLeagues.appendChild(sec);
  });

  const wrap = document.getElementById('preview-wrap');
  wrap.classList.add('visible');
  wrap.scrollIntoView({behavior:'smooth', block:'start'});
}

// ═══════════════════════════════════════════════════════
function takeScreenshot() {
  const card = document.getElementById('card-wrapper');
  const imgs = card.querySelectorAll('img');
  Promise.all(Array.from(imgs).map(img =>
    img.complete ? Promise.resolve() : new Promise(r => { img.onload=r; img.onerror=r; })
  )).then(() => {
    const isDark = document.body.classList.contains('dark');
    const bgColor = isDark ? '#0d0f14' : '#ffffff';
    // Get exact rendered height to avoid extra whitespace
    const rect = card.getBoundingClientRect();
    html2canvas(card, {
      scale: 3,
      useCORS: true,
      allowTaint: false,
      backgroundColor: bgColor,
      width: rect.width,
      height: card.scrollHeight,
      windowWidth: rect.width,
    }).then(canvas => {
      // Crop canvas to remove any trailing blank rows
      const ctx = canvas.getContext('2d');
      const scale = 3;
      let lastRow = canvas.height - 1;
      const bg = isDark ? [13, 15, 20] : [255, 255, 255];
      outer: for (let y = canvas.height - 1; y >= 0; y--) {
        for (let x = 0; x < canvas.width; x++) {
          const d = ctx.getImageData(x, y, 1, 1).data;
          if (Math.abs(d[0]-bg[0])>4 || Math.abs(d[1]-bg[1])>4 || Math.abs(d[2]-bg[2])>4) {
            lastRow = y; break outer;
          }
        }
      }
      const cropped = document.createElement('canvas');
      cropped.width = canvas.width;
      cropped.height = lastRow + 1;
      cropped.getContext('2d').drawImage(canvas, 0, 0);
      const a = document.createElement('a'); a.download = 'skor-kart.png';
      a.href = cropped.toDataURL('image/png'); a.click();
    });
  });
}

const LS_KEY = 'skorkart_v1';

function saveState() {
  const leagues = [];
  document.querySelectorAll('.league-block').forEach(lb => {
    const lgId = lb.dataset.lgId;
    const matches = [];
    lb.querySelectorAll('.match-row').forEach(row => {
      const mid = row.id.replace('mr-', '');
      const h = (document.getElementById('ti-h-' + mid)||{}).value || '';
      const a = (document.getElementById('ti-a-' + mid)||{}).value || '';
      const s1 = (document.getElementById('sh-' + mid)||{}).value || '0';
      const s2 = (document.getElementById('sa-' + mid)||{}).value || '0';
      matches.push({ home: h, away: a, s1: parseInt(s1), s2: parseInt(s2) });
    });
    leagues.push({ lgId, matches });
  });

  const state = {
    brand: document.getElementById('inp-brand').value || '',
    date:  document.getElementById('inp-date').value  || '',
    dark:  document.body.classList.contains('dark'),
    leagues
  };
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {}
}

function loadState() {
  let state;
  try { state = JSON.parse(localStorage.getItem(LS_KEY)); } catch(e) {}

  if (!state) {
    // İlk açılış — default məlumatlar
    addLeague('eflcup',  [{home:'Manchester City',s1:4,s2:0,away:'Liverpool'},{home:'Chelsea',s1:7,s2:0,away:'Port Vale'},{home:'Southampton',s1:2,s2:1,away:'Arsenal'}]);
    addLeague('laliga',  [{home:'Mallorca',s1:2,s2:1,away:'Real Madrid'},{home:'Atletico Madrid',s1:0,s2:0,away:'Barcelona'}]);
    return;
  }

  // Tema
  if (state.dark) {
    document.body.classList.add('dark');
    document.getElementById('theme-btn').textContent = '☀️ Açıq';
  }

  // Brand & tarix
  if (state.brand !== undefined) document.getElementById('inp-brand').value = state.brand;
  if (state.date)                document.getElementById('inp-date').value  = state.date;

  // Liqalar & matçlar
  if (state.leagues && state.leagues.length) {
    state.leagues.forEach(lg => {
      addLeague(lg.lgId, lg.matches);
    });
  } else {
    addLeague('epl',    [{home:'Tottenham',s1:2,s2:1,away:'Manchester City'},{home:'Liverpool',s1:3,s2:1,away:'Chelsea'}]);
    addLeague('laliga', [{home:'Barcelona',s1:2,s2:0,away:'Real Madrid'}]);
  }
}

// Avtomatik saxla — hər input dəyişəndə
document.addEventListener('input',  () => saveState());
document.addEventListener('change', () => saveState());

// Liqa seçimi dəyişəndə saxla (selectLeague funksiyasını extend et)
const _origSelectLeague = selectLeague;
selectLeague = function(lid, lgId) {
  _origSelectLeague(lid, lgId);
  setTimeout(saveState, 50);
};

// Liqa/matç əlavə-sil edəndə saxla
const _origAddLeague = addLeague;
addLeague = function(lgId, matches) {
  _origAddLeague(lgId, matches);
  setTimeout(saveState, 50);
};
const _origRemoveLeague = removeLeague;
removeLeague = function(lid) {
  _origRemoveLeague(lid);
  setTimeout(saveState, 50);
};
const _origAddMatch = addMatch;
addMatch = function(lid, home, s1, s2, away) {
  _origAddMatch(lid, home, s1, s2, away);
  setTimeout(saveState, 50);
};
const _origRemoveMatch = removeMatch;
removeMatch = function(mid) {
  _origRemoveMatch(mid);
  setTimeout(saveState, 50);
};

// Yüklə
loadState();

function toggleTheme() {
  const isDark = document.body.classList.toggle('dark');
  document.getElementById('theme-btn').textContent = isDark ? '☀️ Açıq' : '🌙 Qara';
  saveState();
}
</script>
</body>
</html>
